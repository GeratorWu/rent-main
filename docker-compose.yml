services:
  myservice:
    build:
      context: ./MyService
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    container_name: myservice

  customerservice:
    build:
      context: ./CustomerService
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    container_name: customerservice

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    container_name: frontend
    depends_on:
      - myservice
      - customerservice
