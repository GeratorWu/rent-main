name: CI - Build, Test and Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  actions: read
  security-events: write
  checks: write
  pull-requests: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run MyService tests and coverage
        run: |
          cd ./MyService
          chmod +x gradlew
          ./gradlew clean check jacocoTestReport

      - name: Run CustomerService tests and coverage
        run: |
          cd ./CustomerService
          chmod +x gradlew
          ./gradlew clean check jacocoTestReport

      - name: Publish MyService test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: MyService/build/test-results/**/*.xml
          check_name: MyService Test Results

      - name: Publish CustomerService test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: CustomerService/build/test-results/**/*.xml
          check_name: CustomerService Test Results

      - name: Upload MyService JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-myservice
          path: |
            MyService/build/reports/jacoco/test/jacocoTestReport.xml
            MyService/build/reports/jacoco/test/html/**

      - name: Upload CustomerService JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-customerservice
          path: |
            CustomerService/build/reports/jacoco/test/jacocoTestReport.xml
            CustomerService/build/reports/jacoco/test/html/**

      - name: SonarCloud Analysis (MyService)
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != '' }}
        run: |
          cd ./MyService
          ./gradlew sonarqube
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ env.SONAR_ORGANIZATION }}

      - name: Build Docker images
        run: docker compose build

      - name: Integration test with Docker Compose
        run: |
          docker compose up -d
          sleep 20
          curl -f http://localhost:8080/
          curl -f http://localhost:8081/
          curl -f http://localhost:3000/
          curl -f -X POST http://localhost:8080/cars \
            -H "Content-Type: application/json" \
            -d '{"plateNumber":"ABC123","brand":"Toyota","price":15000.0}'
          curl -f http://localhost:8080/cars/ABC123
          curl -f -X POST http://localhost:8081/customers \
            -H "Content-Type: application/json" \
            -d '{"id":"C001","name":"Alice","email":"alice@example.com"}'
          curl -f http://localhost:8081/customers/C001
          curl -f http://localhost:3000/api/cars
          curl -f http://localhost:3000/api/customers
          docker compose down
